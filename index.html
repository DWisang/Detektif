<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detective Messenger</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="phone-app">
    <div class="status-bar">
      <div id="clock">09:41</div>
      <div class="status-icons">
        <div class="signal">
          <span></span><span></span><span></span><span></span>
        </div>
        <div class="battery">
          <div class="battery-level"></div>
        </div>
      </div>
    </div>

    <div class="app-layout">
      <aside class="sidebar">
        <div class="sidebar-logo">
          <div class="logo-circle">
            <svg viewBox="0 0 24 24">
              <path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"></path>
            </svg>
          </div>
        </div>

        <div class="contact-list" id="contacts"></div>
      </aside>

      <main class="chat">
        <div class="chat-header">
          <div class="chat-person">
            <div class="header-avatar" id="headerAvatar"></div>
            <div class="chat-info">
              <div class="chat-name" id="chatName">Pilih kontak</div>
              <div class="chat-status" id="chatRole">Online</div>
            </div>
          </div>

          <div class="chat-actions">
            <button class="icon-btn">
              <svg viewBox="0 0 24 24">
                <path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.7 19.7 0 0 1-8.6-3.1A19.3 19.3 0 0 1 5.2 13 19.7 19.7 0 0 1 2.1 4.4 2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7l.5 3a2 2 0 0 1-.6 1.8L7.7 9.8a16 16 0 0 0 6.5 6.5l1.3-1.3a2 2 0 0 1 1.8-.6l3 .5A2 2 0 0 1 22 16.9z"></path>
              </svg>
            </button>

            <button class="icon-btn case-icon" onclick="openCaseBoard()">
              <svg viewBox="0 0 24 24">
                <rect x="5" y="3" width="14" height="18" rx="2"></rect>
                <path d="M9 8h6"></path>
                <path d="M9 12h6"></path>
                <path d="M9 16h4"></path>
              </svg>
            </button>
          </div>
        </div>

        <div class="chat-window" id="chatWindow">
          <div class="system-msg">Pilih kontak di kiri untuk mulai interogasi</div>
        </div>

        <div class="choice-area" id="choiceArea"></div>
      </main>

      <div class="drawer-overlay" id="drawerOverlay" onclick="closeCaseBoard()"></div>

      <aside class="case-board" id="caseBoard">
        <div class="case-header">
          <div class="case-title">Case Board</div>
          <div class="case-desc">
            Kumpulkan bukti dari chat, lalu tentukan siapa pelaku sebenarnya.
          </div>
          <div class="progress" id="progressText">Bukti: 0/9</div>
        </div>

        <div class="evidence-list" id="evidenceList"></div>

        <div class="accuse-box">
          <h3>Tuduh Pelaku</h3>
          <select id="suspectSelect">
            <option value="">Pilih tersangka</option>
            <option value="Raka">Raka</option>
            <option value="Mira">Mira</option>
            <option value="Doni">Doni</option>
            <option value="Sinta">Sinta</option>
          </select>

          <button class="accuse-btn" onclick="accuse()">Tuduh Sekarang</button>
          <button class="restart-btn" onclick="restartGame()">Restart</button>

          <div class="result" id="result">Belum ada keputusan.</div>
        </div>
      </aside>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
